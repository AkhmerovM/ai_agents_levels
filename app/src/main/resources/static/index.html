<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уровни ИИ-агентов</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #58a6ff;
            white-space: nowrap;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            flex: 1;
        }

        select, button {
            background: #21262d;
            color: #e1e4e8;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
        }

        select:focus, button:focus { outline: none; border-color: #58a6ff; }

        button:hover { background: #30363d; }

        button.primary {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }

        button.primary:hover { background: #388bfd; }

        button.danger { background: #da3633; border-color: #da3633; color: white; }
        button.danger:hover { background: #f85149; }

        button.success { background: #238636; border-color: #238636; color: white; }
        button.success:hover { background: #2ea043; }

        #pattern-desc {
            font-size: 12px;
            color: #8b949e;
            padding: 4px 0;
            min-height: 18px;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* Левая панель: чат */
        #chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #30363d;
            min-width: 300px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message.user {
            background: #1f6feb22;
            border: 1px solid #1f6feb44;
            align-self: flex-end;
        }

        .message.assistant {
            background: #21262d;
            border: 1px solid #30363d;
            align-self: flex-start;
        }

        .message.system {
            background: #0d1117;
            border: 1px solid #21262d;
            color: #8b949e;
            font-size: 12px;
            align-self: center;
            text-align: center;
        }

        .message-meta {
            font-size: 11px;
            color: #8b949e;
            margin-top: 4px;
        }

        #input-area {
            padding: 12px 16px;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 8px;
        }

        #user-input {
            flex: 1;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e1e4e8;
            padding: 8px 12px;
            font-size: 14px;
            resize: none;
            height: 60px;
            font-family: inherit;
        }

        #user-input:focus { outline: none; border-color: #58a6ff; }

        /* Правая панель: «Под капотом» */
        #trace-panel {
            width: 420px;
            display: flex;
            flex-direction: column;
            background: #0d1117;
            min-width: 280px;
        }

        #trace-header {
            padding: 12px 16px;
            border-bottom: 1px solid #30363d;
            font-size: 13px;
            font-weight: 600;
            color: #f0883e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #trace-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .trace-step {
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #30363d;
        }

        .trace-step-header {
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .trace-step-header:hover { filter: brightness(1.2); }

        .trace-step-body {
            padding: 8px 10px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            border-top: 1px solid #30363d;
            background: #0d1117;
            max-height: 300px;
            overflow-y: auto;
        }

        .step-type-prompt .trace-step-header { background: #1a1e2e; color: #79c0ff; }
        .step-type-model .trace-step-header { background: #1a2e1a; color: #56d364; }
        .step-type-tool-call .trace-step-header { background: #2e1a1a; color: #ff7b72; }
        .step-type-tool-result .trace-step-header { background: #2e2a1a; color: #e3b341; }
        .step-type-retrieved .trace-step-header { background: #1a2a2e; color: #39d3f0; }
        .step-type-memory .trace-step-header { background: #2a1a2e; color: #bc8cff; }
        .step-type-info .trace-step-header { background: #21262d; color: #8b949e; }

        .step-icon { font-size: 14px; }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8b949e;
            font-size: 13px;
            padding: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #role-selector {
            display: none;
        }

        .empty-trace {
            color: #8b949e;
            font-size: 13px;
            text-align: center;
            padding: 32px 16px;
        }

        #session-info {
            font-size: 11px;
            color: #8b949e;
            padding: 0 4px;
        }
    </style>
</head>
<body>

<header>
    <h1>🤖 Уровни ИИ-агентов</h1>
    <div class="controls">
        <select id="level-select" onchange="onLevelChange()">
            <option value="">— Уровень —</option>
        </select>
        <select id="pattern-select" onchange="onPatternChange()">
            <option value="">— Паттерн —</option>
        </select>
        <select id="role-selector" onchange="onRoleChange()">
            <option value="teacher">👨‍🏫 Учитель</option>
            <option value="lawyer">⚖️ Юрист</option>
            <option value="child">🧒 Ребёнок</option>
            <option value="scientist">🔬 Учёный</option>
            <option value="comedian">😄 Комик</option>
        </select>
        <button class="success" id="ingest-btn" onclick="ingestDocuments()" style="display:none">
            📚 Загрузить документы
        </button>
        <button class="danger" onclick="resetSession()">🔄 Сбросить сессию</button>
        <span id="session-info"></span>
    </div>
</header>

<div style="padding: 4px 20px; background: #161b22; border-bottom: 1px solid #30363d;">
    <div id="pattern-desc">Выберите уровень и паттерн</div>
</div>

<main>
    <div id="chat-panel">
        <div id="messages">
            <div class="message system">
                Добро пожаловать! Выберите уровень и паттерн, затем задайте вопрос.
            </div>
        </div>
        <div id="input-area">
            <textarea id="user-input" placeholder="Введите сообщение..." onkeydown="onInputKeydown(event)"></textarea>
            <button class="primary" onclick="sendMessage()" id="send-btn">Отправить</button>
        </div>
    </div>

    <div id="trace-panel">
        <div id="trace-header">
            🔍 Под капотом
        </div>
        <div id="trace-content">
            <div class="empty-trace">
                Здесь будет показано, что происходит внутри при обработке запроса:<br>
                промпты, ответы модели, вызовы инструментов, найденные документы.
            </div>
        </div>
    </div>
</main>

<script>
    // Состояние приложения
    const state = {
        patterns: [],           // Все паттерны с бэкенда
        selectedLevel: null,
        selectedPattern: null,
        selectedRole: 'teacher',
        sessionId: generateSessionId(),
    };

    function generateSessionId() {
        return 'session-' + Math.random().toString(36).substr(2, 9);
    }

    // Иконки для типов шагов трассировки
    const STEP_ICONS = {
        'prompt': '📝',
        'model': '🤖',
        'tool-call': '🔧',
        'tool-result': '✅',
        'retrieved': '🔍',
        'memory': '🧠',
        'info': 'ℹ️',
    };

    // При загрузке страницы: получаем паттерны с бэкенда
    async function init() {
        document.getElementById('session-info').textContent = 'ID: ' + state.sessionId;
        try {
            const resp = await fetch('/api/patterns');
            state.patterns = await resp.json();
            buildLevelSelect();
        } catch (e) {
            addSystemMessage('Ошибка подключения к бэкенду: ' + e.message);
        }
    }

    function buildLevelSelect() {
        const levelSelect = document.getElementById('level-select');
        const levels = [...new Set(state.patterns.map(p => p.level))].sort();
        levelSelect.innerHTML = '<option value="">— Уровень —</option>';
        const levelNames = { '1': '1 — Чистая LLM', '2': '2 — Память и RAG', '3': '3 — Инструменты' };
        levels.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l;
            opt.textContent = levelNames[l] || 'Уровень ' + l;
            levelSelect.appendChild(opt);
        });
    }

    function onLevelChange() {
        const level = document.getElementById('level-select').value;
        state.selectedLevel = level;
        state.selectedPattern = null;

        const patternSelect = document.getElementById('pattern-select');
        patternSelect.innerHTML = '<option value="">— Паттерн —</option>';
        document.getElementById('pattern-desc').textContent = 'Выберите паттерн';

        if (!level) return;

        const levelPatterns = state.patterns.filter(p => p.level === level);
        levelPatterns.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.title;
            patternSelect.appendChild(opt);
        });
    }

    function onPatternChange() {
        const patternId = document.getElementById('pattern-select').value;
        state.selectedPattern = patternId;

        const pattern = state.patterns.find(
            p => p.level === state.selectedLevel && p.id === patternId
        );

        document.getElementById('pattern-desc').textContent =
            pattern ? pattern.description : '';

        // Показываем/скрываем кнопку загрузки документов
        document.getElementById('ingest-btn').style.display =
            patternId === 'rag' ? 'inline-block' : 'none';

        // Показываем/скрываем выбор роли
        document.getElementById('role-selector').style.display =
            patternId === 'role-prompting' ? 'inline-block' : 'none';
    }

    function onRoleChange() {
        state.selectedRole = document.getElementById('role-selector').value;
    }

    function onInputKeydown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const message = input.value.trim();
        if (!message) return;
        if (!state.selectedLevel || !state.selectedPattern) {
            addSystemMessage('Пожалуйста, выберите уровень и паттерн.');
            return;
        }

        input.value = '';
        addUserMessage(message);
        showLoading();
        clearTrace();

        const requestBody = {
            level: state.selectedLevel,
            pattern: state.selectedPattern,
            message: message,
            sessionId: state.sessionId,
            role: state.selectedRole,
        };

        try {
            const resp = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody),
            });
            const data = await resp.json();
            hideLoading();
            addAssistantMessage(data.answer);
            renderTrace(data.trace || []);
        } catch (e) {
            hideLoading();
            addSystemMessage('Ошибка: ' + e.message);
        }
    }

    async function ingestDocuments() {
        const btn = document.getElementById('ingest-btn');
        btn.disabled = true;
        btn.textContent = '⏳ Загрузка...';
        clearTrace();

        try {
            const resp = await fetch('/api/level2/ingest', { method: 'POST' });
            const data = await resp.json();
            addSystemMessage(data.answer);
            renderTrace(data.trace || []);
        } catch (e) {
            addSystemMessage('Ошибка загрузки: ' + e.message);
        } finally {
            btn.disabled = false;
            btn.textContent = '📚 Загрузить документы';
        }
    }

    async function resetSession() {
        try {
            await fetch('/api/session/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: state.sessionId }),
            });
        } catch (e) {}
        state.sessionId = generateSessionId();
        document.getElementById('session-info').textContent = 'ID: ' + state.sessionId;
        document.getElementById('messages').innerHTML =
            '<div class="message system">Сессия сброшена. Новый ID: ' + state.sessionId + '</div>';
        clearTrace();
    }

    function addUserMessage(text) {
        const div = document.createElement('div');
        div.className = 'message user';
        div.textContent = text;
        document.getElementById('messages').appendChild(div);
        scrollToBottom();
    }

    function addAssistantMessage(text) {
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.textContent = text;
        const meta = document.createElement('div');
        meta.className = 'message-meta';
        meta.textContent = state.selectedLevel + ' · ' + state.selectedPattern;
        div.appendChild(meta);
        document.getElementById('messages').appendChild(div);
        scrollToBottom();
    }

    function addSystemMessage(text) {
        const div = document.createElement('div');
        div.className = 'message system';
        div.textContent = text;
        document.getElementById('messages').appendChild(div);
        scrollToBottom();
    }

    function showLoading() {
        const div = document.createElement('div');
        div.className = 'loading';
        div.id = 'loading-indicator';
        div.innerHTML = '<div class="spinner"></div><span>Обрабатываю запрос...</span>';
        document.getElementById('messages').appendChild(div);
        document.getElementById('send-btn').disabled = true;
        scrollToBottom();
    }

    function hideLoading() {
        const el = document.getElementById('loading-indicator');
        if (el) el.remove();
        document.getElementById('send-btn').disabled = false;
    }

    function scrollToBottom() {
        const msgs = document.getElementById('messages');
        msgs.scrollTop = msgs.scrollHeight;
    }

    function clearTrace() {
        document.getElementById('trace-content').innerHTML =
            '<div class="empty-trace">Ожидание запроса...</div>';
    }

    function renderTrace(steps) {
        const container = document.getElementById('trace-content');
        if (!steps || steps.length === 0) {
            container.innerHTML = '<div class="empty-trace">Трассировка недоступна</div>';
            return;
        }

        container.innerHTML = '';
        steps.forEach((step, idx) => {
            const icon = STEP_ICONS[step.type] || '•';
            const div = document.createElement('div');
            div.className = 'trace-step step-type-' + step.type;

            const header = document.createElement('div');
            header.className = 'trace-step-header';
            header.innerHTML = `<span class="step-icon">${icon}</span><span>${escapeHtml(step.label)}</span>`;
            header.onclick = () => {
                body.style.display = body.style.display === 'none' ? 'block' : 'none';
            };

            const body = document.createElement('div');
            body.className = 'trace-step-body';
            body.textContent = step.content;

            div.appendChild(header);
            div.appendChild(body);
            container.appendChild(div);
        });

        container.scrollTop = 0;
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    init();
</script>
</body>
</html>
